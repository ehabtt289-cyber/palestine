<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d14"/>
      <stop offset="100%" stop-color="#1a3a25"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Palestinian flag stripes inside a shield-ish shape -->
  <g transform="translate(96 128)">
    <rect width="320" height="80" fill="#000"/>
    <rect y="80" width="320" height="80" fill="#fff"/>
    <rect y="160" width="320" height="80" fill="#149954"/>
    <polygon points="0,0 0,240 140,120" fill="#E4312B"/>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#E8C36A">فلسطين</text>
</svg>
